
stages:
  - validate
  - package

default:
  image: docker.artifactory.booking.com/projects/golang/golang-ci:1.15

lint:
  stage: validate
  script:
  - make lint
  tags:
  - docker

# NOTE: This is a throw-away build; the artifact is not used anywhere.
build:
  tags:
  - docker
  stage: validate
  script:
  - make build

package_subnanotube:
  stage: package
  tags: 
    - docker
  only:
    - tags
    - /^subnanotube-\d+-\d+$/
  script:
    - .gitlab-ci/gitlab-package.sh subnanotube
